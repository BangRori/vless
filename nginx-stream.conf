user nginx;
worker_processes auto;

events { worker_connections 1024; }

stream {
    resolver 127.0.0.11 valid=10s ipv6=off;

    # === Серый список ===
    geo $suspicious {
        default 0;
        include /etc/nginx/graylist.conf;  # ← читает файл с хоста
    }

    # === Маршрутизация ===
    map $ssl_preread_server_name $backend {
        google.com  vless:1080;
        default             fallback:443;
    }

    map $suspicious $final_backend {
        0 $backend;
        1 "fallback:443";  # подозрительные — только сайт
    }

    log_format proxy '$remote_addr -> $backend [$time_local] $status '
                     'bytes=$bytes_sent/$bytes_received conn=$connection '
                     'sni=$ssl_preread_server_name duration=$session_time proto=$protocol';
    access_log /var/log/nginx/stream-access.log proxy;

    server {
        listen 443;
        ssl_preread on;
        proxy_pass $final_backend;  # ← используем $final_backend
        proxy_connect_timeout 5s;
        proxy_timeout 3600s;
        proxy_socket_keepalive on;
    }
}