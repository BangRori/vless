# /etc/dpi-alert/dpi_detector.yml

log_file: "/var/log/nginx/stream-access.log"
reputation_db: "/var/lib/dpi-alert/reputation.json"

client:
  sni: "google.com" # Ваш камуфляж-домен
  backend: "vless:1080" # Ваш VLESS-бэкенд

thresholds:
  rate_window_sec: 60
  rate_threshold: 4
  tiny_bytes: 300
  correlation_window_sec: 5
  short_session_sec: 2.0
  pcap_score_threshold: 3
  burst_window_sec: 5
  burst_threshold: 10
  score_threshold: 4

nginx_detector:
  detect_half_handshake: true

graylist:
  enabled: true
  file: "/etc/nginx/graylist.conf"
  container: "nginx_stream"

suspicious_perfect:
  enabled: true
  log_file: "/var/log/dpi-alert/suspicious-perfect.log"

by_connections:
  enabled: true
  log_file: "/var/log/dpi-alert/by-connections.log"

pcap:
  dir: /var/log/tcpdump
  pattern: "tls-*.pcap"
  min_size_bytes: 24
  suspicious_windows:
    - 0
    - 512
    - 1024
    - 2048
    - 4096
  normal_mss_min: 1200
  normal_mss_max: 1460

allowed_asns:
  - "AS6697"
  - "AS42772"
  - "AS25106"
  - "AS60280"
  - "AS44843"

