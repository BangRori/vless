version: "2.4"

services:
  duckdns:
    image: linuxserver/duckdns
    container_name: duckdns
    labels:
      - "watchtower.enable=true"
    environment:
      - SUBDOMAINS= #ваш субдомен
      - TOKEN= #ваш токен
      - TZ=Europe/Minsk
    restart: unless-stopped
    mem_limit: 16M
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "3"

  vless:
    image: teddysun/xray:latest
    container_name: vless
    restart: unless-stopped
    labels:
      - "watchtower.enable=true"
    environment:
      TZ: Europe/Minsk
    volumes:
      - ./server.json:/etc/xray/config.json:ro
      - /var/log/vpn:/var/log/vpn
    command: ["xray", "run", "-c", "/etc/xray/config.json"]
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "3"
    depends_on:
      - fallback
    healthcheck:
      test: ["CMD", "nc", "-z", "127.0.0.1", "8080"]
      interval: 30s
      timeout: 5s
      retries: 3
    mem_limit: 32M
    networks:
      - vless_net

  fallback:
    image: nginx:alpine
    container_name: nginx_fallback
    restart: unless-stopped
    labels:
      - "watchtower.enable=true"
    expose:
      - "80" # HTTP (обязателен для HTTP-01 челенджа)
      - "443" # HTTPS (nginx-proxy будет проксировать сюда)
    volumes:
      - ./fallback.conf:/etc/nginx/conf.d/default.conf
      - ./html:/usr/share/nginx/html:ro
      - ./certs:/etc/nginx/certs:ro
    environment:
      - VIRTUAL_HOST= # ваш домен
      - LETSENCRYPT_HOST= # тот же домен
      - LETSENCRYPT_EMAIL= # почта для Let's Encrypt
      - NGINX_RELOAD_ON_CERT_CHANGE=true
      - TZ=Europe/Minsk
    networks:
      - vless_net
      - proxy_net
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "3"
    mem_limit: 16M

  nginx_stream:
    image: nginx:alpine
    container_name: nginx_stream
    restart: unless-stopped
    environment:
      TZ: Europe/Minsk
    labels:
      - "watchtower.enable=true"
    ports:
      - "443:443/tcp"
    volumes:
      - /etc/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - /etc/nginx/graylist.conf:/etc/nginx/graylist.conf
      - /var/log/nginx:/var/log/nginx
    networks:
      - vless_net
    depends_on:
      - vless
      - fallback
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "3"
    mem_limit: 16M

  nginx-proxy:
    image: nginx:alpine
    container_name: nginx-proxy
    restart: unless-stopped
    labels:
      - "watchtower.enable=true"
    ports:
      - "80:80"
    volumes:
      - /var/log/nginx:/var/log/nginx
      - ./conf.d:/etc/nginx/conf.d # сюда docker-gen будет писать default.conf
      - ./vhost.d:/etc/nginx/vhost.d
      - ./html:/usr/share/nginx/html
      - ./certs:/etc/nginx/certs
    mem_limit: 16M
    networks:
      - proxy_net
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "3"

  dockergen:
    image: nginxproxy/docker-gen:latest
    container_name: nginx-gen
    restart: unless-stopped
    command: -notify-sighup nginx-proxy -watch /etc/docker-gen/templates/nginx.tmpl /etc/nginx/conf.d/default.conf
    labels:
      - "watchtower.enable=true"
    volumes:
      - /var/run/docker.sock:/tmp/docker.sock:ro
      - ./nginx.tmpl:/etc/docker-gen/templates/nginx.tmpl:ro
      - ./conf.d:/etc/nginx/conf.d # пишем сюда default.conf
      - ./vhost.d:/etc/nginx/vhost.d
      - ./html:/usr/share/nginx/html
      - ./certs:/etc/nginx/certs
    mem_limit: 16M
    networks:
      - proxy_net
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "3"

  letsencrypt:
    image: jrcs/letsencrypt-nginx-proxy-companion:latest
    container_name: letsencrypt
    restart: unless-stopped
    labels:
      - "watchtower.enable=true"
    environment:
      NGINX_PROXY_CONTAINER: nginx-proxy
      NGINX_DOCKER_GEN_CONTAINER: nginx-gen
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./conf.d:/etc/nginx/conf.d
      - ./vhost.d:/etc/nginx/vhost.d
      - ./html:/usr/share/nginx/html
      - ./certs:/etc/nginx/certs
      - ./acme:/etc/acme.sh
    mem_limit: 32M
    networks:
      - proxy_net
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "3"

  watchtower:
    image: containrrr/watchtower:latest
    container_name: watchtower
    restart: unless-stopped
    environment:
      - DOCKER_API_VERSION=1.44
      - TZ=Europe/Minsk
      - WATCHTOWER_CLEANUP=true
      - WATCHTOWER_POLL_INTERVAL=259200
      - WATCHTOWER_INCLUDE_STOPPED=false
      - WATCHTOWER_DEBUG=false
      # Только контейнеры с лейблом watchtower.enable=true
      - WATCHTOWER_LABEL_ENABLE=watchtower.enable
      - WATCHTOWER_SCOPE=
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "3"
    mem_limit: 32M

networks:
  vless_net:
    driver: bridge
  proxy_net:
    driver: bridge

volumes:
  certs:
  vhost:
  html:
  dhparam:
