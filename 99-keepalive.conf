net.ipv4.tcp_keepalive_time = 600      # первый keepalive probe через 10 мин бездействия
net.ipv4.tcp_keepalive_intvl = 60     # интервал между probe'ами
net.ipv4.tcp_keepalive_probes = 10    # количество probe'ов до разрыва
net.ipv4.tcp_fin_timeout = 30         # быстрее освобождать FIN_WAIT соединения
net.ipv4.tcp_tw_reuse = 1             # переиспользовать TIME_WAIT сокеты
net.ipv4.tcp_syncookies = 1
net.ipv4.tcp_syn_retries = 2
net.ipv4.tcp_synack_retries = 2