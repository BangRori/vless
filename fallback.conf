# ============================================================
# HTTP :80 — ACME challenge + отклонение остального трафика
# ============================================================
server {
    listen 80;
    server_name "ваш субдомен".duckdns.org;

    # ACME challenge — обязательно для LetsEncrypt
    location ^~ /.well-known/acme-challenge/ {
        root /usr/share/nginx/html;
        default_type "text/plain";
        access_log off;
    }

    # Всё остальное на порту 80 — закрываем соединение без ответа
    location / {
        return 444;
    }
}

# ============================================================
# HTTPS :443 — фоллбэк-страница (только если сертификат есть)
# ============================================================
server {
    listen 443 ssl http2;
    server_name "ваш субдомен".duckdns.org;

    # Сертификаты (должны существовать!)
    ssl_certificate     /etc/nginx/certs/"ваш субдомен".duckdns.org/fullchain.pem;
    ssl_certificate_key /etc/nginx/certs/"ваш субдомен".duckdns.org/key.pem;

    # Современные настройки TLS
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;  # Пусть клиент выбирает из безопасного списка
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    # Корень сайта
    root /usr/share/nginx/html;
    index index.html;

    # Безопасность: скрыть версию nginx, запретить листинг
    server_tokens off;
    autoindex off;

    # Заголовки безопасности (опционально, но рекомендуется)
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "no-referrer-when-downgrade" always;

    # Логирование (можно отключить для тишины, если трафик большой)
    access_log /var/log/nginx/fallback-access.log;
    error_log /var/log/nginx/fallback-error.log warn;

    # Основной контент
    location / {
        try_files $uri $uri/ =404;
    }

    # Страница ошибки 404 — возвращаем легитимный контент, а не стандартную ошибку
    error_page 404 /index.html;
    location = /404.html {
        internal;
    }
}